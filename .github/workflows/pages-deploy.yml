name: "Build and Deploy"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  schedule:
    - cron: '0 15,19,23,3,7 * * *' # Every 4 hours, matching KST 00:00, 04:00, 08:00, 12:00, 16:00 (since UTC = KST - 9h)
    - cron: '0 0 * * *' # Daily at 09:00 KST (00:00 UTC)

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Telegram Status Update
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *')
        env:
          TELEGRAM_BOT_TOKEN: "8818209461:AAHiwR3eSLlSWR5dIbq6iUIdhsqVSl5qyoQ"
          TELEGRAM_CHAT_ID: "513488451"
        run: |
          python -c '
          import os, glob, datetime, urllib.request, urllib.parse
          posts_dir = "_posts"
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          now = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          today_str = now.strftime("%Y-%m-%d")
          
          scheduled_list = []
          for filepath in glob.glob(os.path.join(posts_dir, "*.md")):
              if "gitkeep" in filepath: continue
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              
              title = ""
              p_date = ""
              p_time = ""
              
              parts = content.split("---")
              if len(parts) >= 3:
                  yaml_lines = parts[1].split("\n")
                  for line in yaml_lines:
                      if line.startswith("title:"):
                          title = line.replace("title:", "").strip().strip("\"").strip("\'")
                      if line.startswith("date:"):
                          date_val = line.replace("date:", "").strip()
                          date_parts = date_val.split()
                          if len(date_parts) >= 2:
                              p_date = date_parts[0]
                              p_time = ":".join(date_parts[1].split(":")[:2])
                              
              if p_date and p_date >= today_str:
                  scheduled_list.append((p_date, p_time, title))
                  
          scheduled_list.sort(key=lambda x: (x[0], x[1]))
          
          if not scheduled_list:
              message = "[Head Skinification Lab]\n오늘 이후로 예약된 포스트가 존재하지 않습니다."
          else:
              message = "[Head Skinification Lab]\n📅 블로그 예약 발행 현황 알림\n"
              current_date = ""
              for p_date, p_time, title in scheduled_list:
                  if current_date != p_date:
                      current_date = p_date
                      message += f"\n■ {current_date}\n"
                  message += f"- {p_time} : {title}\n"
                  
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": message}).encode("utf-8")
          urllib.request.urlopen(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          print("Telegram notification sent successfully.")
          '

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: ${{ hashFiles('Gemfile.lock') != '' }}


      - name: Generate, Install and Commit Gemfile.lock (if missing)
        if: ${{ hashFiles('Gemfile.lock') == '' }}
        run: |
          bundle lock --add-platform x86_64-linux
          gem install bundler
          bundle install
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Gemfile.lock
          git commit -m "Chore: auto-generate Gemfile.lock on runner"
          git push

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      # - name: Test site
      #   run: |
      #     bundle exec htmlproofer _site \
      #       --disable-external \
      #       --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
