name: "Build and Deploy"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  schedule:
    - cron: '0 15,19,23,3,7 * * *' # Every 4 hours, matching KST 00:00, 04:00, 08:00, 12:00, 16:00 (since UTC = KST - 9h)
    - cron: '0 0 * * *' # Daily at 09:00 KST (00:00 UTC)

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Telegram Status Update
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *')
        env:
          TELEGRAM_BOT_TOKEN: "8818209461:AAHiwR3eSLlSWR5dIbq6iUIdhsqVSl5qyoQ"
          TELEGRAM_CHAT_ID: "513488451"
        run: |
          python send_telegram_status.py

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: ${{ hashFiles('Gemfile.lock') != '' }}


      - name: Generate, Install and Commit Gemfile.lock (if missing)
        if: ${{ hashFiles('Gemfile.lock') == '' }}
        run: |
          bundle lock --add-platform x86_64-linux
          gem install bundler
          bundle install
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Gemfile.lock
          git commit -m "Chore: auto-generate Gemfile.lock on runner"
          git push

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      # - name: Test site
      #   run: |
      #     bundle exec htmlproofer _site \
      #       --disable-external \
      #       --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
